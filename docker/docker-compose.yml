services:


  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/taskflow
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=2005
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

    networks:
      - taskflow-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow-network

  prometheus:
    image: prom/prometheus
    container_name: taskflow_prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - taskflow-network

  grafana:
    image: grafana/grafana
    container_name: taskflow_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - taskflow-network

  db:
    image: postgres:15
    container_name: taskflow_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2005
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - taskflow-network

volumes:
  db-data:

networks:
  taskflow-network:
    driver: bridge
