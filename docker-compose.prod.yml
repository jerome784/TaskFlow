version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - taskflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Using the local testing database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/taskflow
      - SPRING_DATASOURCE_USERNAME=taskflow_admin
      - SPRING_DATASOURCE_PASSWORD=supersecret
      - JWT_SECRET=c2VjcmV0a2V5dGhhdGlzdGVzdGVkZm9ybG9jYWx0ZXN0aW5ncHVycG9zZXM=
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taskflow-network

  # ---------------------------------------------------------------------------
  # WARNING: This Postgres container is ONLY for local production testing!
  # In actual AWS deployment, this container will NOT be deployed.
  # The backend will connect to a managed AWS RDS instance provisioned via Terraform.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=taskflow
      - POSTGRES_USER=taskflow_admin
      - POSTGRES_PASSWORD=supersecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_admin -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taskflow-network

networks:
  taskflow-network:
    driver: bridge

volumes:
  postgres_data_prod:
