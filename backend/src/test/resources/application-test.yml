spring:
  datasource:
    url: jdbc:h2:mem:taskflow-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

jwt:
  secret: test-secret-key-test-secret-key-test-secret-key
  expiration: 86400000
